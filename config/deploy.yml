# Kamal-деплой TaxMate на Raspberry Pi 5 (arm64) — 192.168.50.155.
#
# На цьому ж хості вже крутяться інші Kamal-застосунки (print_mate_staging,
# apply_mate_staging). Щоб не конфліктувати:
#   • service/image унікальні (taxmate) → контейнери/том/accessory мають свій префікс;
#   • спільний kamal-proxy маршрутизує за Host-хедером → задаємо власний host taxmate.local;
#   • публікований порт Postgres зміщено (5433 print, 5434 apply → 5435 taxmate).
# Запуск:  bin/kamal setup   (перший раз),   далі  bin/kamal deploy

# Унікальне ім'я застосунку — префікс для всіх контейнерів на хості.
service: taxmate

# Образ на Docker Hub (той самий обліковий запис, що й у сусідніх застосунків).
image: andriano606/taxmate

# SSH-користувач на сервері.
ssh:
  user: andrii

# Куди деплоїмо.
servers:
  web:
    - 192.168.50.155

# Спільний kamal-proxy на хості маршрутизує за доменом. Даємо власний host,
# щоб не перетнутися з apply_mate (*.beapply.xyz) / print_mate.
# ssl: false — LAN-застосунок без Let's Encrypt. Додай taxmate.local у /etc/hosts:
#   192.168.50.155  taxmate.local
proxy:
  ssl: false
  host: taxmate.local
  app_port: 80

# Реєстр образів (Docker Hub). Пароль — з .kamal/secrets.
registry:
  username: andriano606
  password:
    - KAMAL_REGISTRY_PASSWORD

# Збірка arm64 віддалено на самому Pi (як у сусідніх застосунків) — швидше за
# емуляцію. Якщо remote недоступний, прибери рядок remote: (збереться через QEMU).
builder:
  arch: arm64
  remote: ssh://andrii@192.168.50.155

# ENV у контейнер (секрети — з .kamal/secrets).
env:
  secret:
    - RAILS_MASTER_KEY
    - TAXMATE_DATABASE_PASSWORD
    - MINIO_SECRET_KEY
  clear:
    # Solid Queue крутиться всередині Puma (одна машина — окремий воркер не потрібен).
    SOLID_QUEUE_IN_PUMA: true

    # Підключення до Postgres-accessory в kamal-мережі (ім'я = service-accessory).
    DATABASE_HOST: taxmate-postgres
    DATABASE_PORT: 5432
    DATABASE_USER: taxmate

    # Active Storage -> MinIO. Застосунок ходить до MinIO по kamal-мережі за
    # іменем контейнера taxmate-minio:9000 (внутрішній порт), не через host-порт.
    MINIO_ENDPOINT: http://taxmate-minio:9000
    MINIO_ACCESS_KEY: taxmate
    MINIO_BUCKET: taxmate

    # RAILS_LOG_LEVEL: debug

# Аліаси: "bin/kamal <alias>".
aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole"
  seed: app exec --interactive --reuse "bin/rails db:seed"

# Постійне сховище: файли Active Storage (production.rb -> service :local) + завантаження.
volumes:
  - "taxmate_storage:/rails/storage"

# Мостимо fingerprinted-ассети між версіями, щоб уникнути 404 на in-flight запитах.
asset_path: /rails/public/assets

# Accessory-сервіси. Postgres 18; ім'я контейнера = taxmate-postgres (унікальне).
# Порт публікуємо лише на 127.0.0.1 і зі зміщенням, щоб не зачепити сусідні БД.
accessories:
  postgres:
    image: postgres:18
    host: 192.168.50.155
    port: "127.0.0.1:5435:5432"
    env:
      clear:
        POSTGRES_USER: taxmate
        POSTGRES_DB: taxmate_production
      secret:
        - POSTGRES_PASSWORD
    # postgres:18 хоче єдиний том на /var/lib/postgresql (дані лягають у підтеку
    # 18/docker) — НЕ /var/lib/postgresql/data, інакше контейнер падає на старті.
    directories:
      - data:/var/lib/postgresql

  # MinIO (S3-сумісне сховище для Active Storage). Ім'я контейнера = taxmate-minio.
  # Порти host зміщено: 9000/9001 (print_mate) і 9002/9003 (apply_mate) зайняті →
  # беремо 9004 (S3 API) / 9005 (веб-консоль). Публікуємо лише на 127.0.0.1
  # (доступ до консолі через SSH-тунель); застосунок ходить по kamal-мережі.
  minio:
    image: minio/minio:latest
    host: 192.168.50.155
    cmd: server /data --console-address ":9001"
    options:
      publish:
        - "127.0.0.1:9004:9000"
        - "127.0.0.1:9005:9001"
    env:
      clear:
        MINIO_ROOT_USER: taxmate
      secret:
        - MINIO_ROOT_PASSWORD
    directories:
      - data:/data
