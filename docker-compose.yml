name: taxmate

# Локальні залежності для розробки: PostgreSQL + MinIO (S3-сумісне сховище).
# Нестандартні хостові порти, щоб не конфліктувати з іншими проєктами на цій машині
# (зайняті 5432/5433/5434 та MinIO 9000/9001).

services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: taxmate
      POSTGRES_PASSWORD: taxmate
      POSTGRES_DB: taxmate_development
    ports:
      - "5435:5432"
    volumes:
      - pg_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taxmate"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: taxmate
      MINIO_ROOT_PASSWORD: taxmate123
    ports:
      - "9002:9000"   # S3 API
      - "9003:9001"   # веб-консоль
    volumes:
      - minio_data:/data

  # Одноразово створює бакет для Active Storage.
  minio-setup:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set local http://minio:9000 taxmate taxmate123; do echo 'waiting for minio...'; sleep 2; done;
      /usr/bin/mc mb --ignore-existing local/taxmate;
      /usr/bin/mc anonymous set download local/taxmate;
      echo 'MinIO bucket ready';
      "

volumes:
  pg_data:
  minio_data:
